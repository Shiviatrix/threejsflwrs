<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lotus & Lily — Bloom</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#000;overflow:hidden;font-family:'Georgia',serif}
    canvas{display:block}
    #ui{
      position:fixed;top:20px;left:50%;transform:translateX(-50%);
      display:flex;gap:14px;z-index:10;pointer-events:none;
      opacity:0;transition:opacity .5s;
    }
    #ui.show{opacity:1;pointer-events:all}
    .btn{
      background:rgba(255,255,255,.08);backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,.18);color:#e8d8c0;
      padding:9px 20px;border-radius:30px;cursor:pointer;font-size:13px;
      letter-spacing:.06em;transition:all .25s;user-select:none;
    }
    .btn:hover{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.4)}
    #hint{
      position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
      color:rgba(255,255,255,.35);font-size:13px;letter-spacing:.12em;
      pointer-events:none;opacity:0;transition:opacity 1s;
    }
    #hint.show{opacity:1}
  </style>
</head>
<body>
<div id="ui">
  <button class="btn" id="btnLotus">+ Lotus</button>
  <button class="btn" id="btnLily">+ Lily</button>
  <button class="btn" id="btnClear">Clear</button>
</div>
<div id="hint">Click anywhere on the water · Scroll to zoom · Drag to orbit</div>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<script>
/* ===== SCENE SETUP ===================================================== */
const W = window.innerWidth, H = window.innerHeight;
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(W,H);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a1a20, 0.04);

const camera = new THREE.PerspectiveCamera(55, W/H, 0.01, 200);
camera.position.set(0, 6, 12);

/* ===== ORBIT CONTROLS (manual) ========================================= */
let orbitState={dragging:false,lastX:0,lastY:0,theta:0,phi:.35,radius:13,didDrag:false};
const orb=orbitState;
renderer.domElement.addEventListener('mousedown',e=>{orb.dragging=true;orb.lastX=e.clientX;orb.lastY=e.clientY;orb.didDrag=false;});
window.addEventListener('mousemove',e=>{
  if(!orb.dragging)return;
  orb.theta-=(e.clientX-orb.lastX)*.006;
  orb.phi=Math.max(.1,Math.min(1.4,orb.phi+(e.clientY-orb.lastY)*.005));
  orb.lastX=e.clientX;orb.lastY=e.clientY;orb.didDrag=true;
});
window.addEventListener('mouseup',()=>orb.dragging=false);
window.addEventListener('wheel',e=>{orb.radius=Math.max(4,Math.min(35,orb.radius+e.deltaY*.015))},{passive:true});

/* ===== LIGHTS ========================================================== */
const ambient=new THREE.HemisphereLight(0x8ec5d6,0x1a3020,0.4);
scene.add(ambient);

const sun=new THREE.DirectionalLight(0xfff4d6,1.8);
sun.position.set(8,18,6);
sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=0.5;sun.shadow.camera.far=60;
sun.shadow.camera.left=-15;sun.shadow.camera.right=15;
sun.shadow.camera.top=15;sun.shadow.camera.bottom=-15;
sun.shadow.bias=-0.0002;
scene.add(sun);

const fill=new THREE.PointLight(0x4080ff,0.5,30);
fill.position.set(-10,5,-10);
scene.add(fill);

/* ===== HELPERS & CONSTANTS ============================================= */
const rand=(a,b)=>a+(b-a)*Math.random();
const tau=Math.PI*2;

/* ===== SHADERS & MATERIALS ============================================= */
const petalVertexShader = `
  varying vec2 vUv;
  varying vec3 vNormal;
  varying vec3 vViewDir;
  uniform float uTime;
  void main() {
    vUv = uv;
    vec3 p = position;
    p.y += sin(uTime * 1.5 + position.x * 8.0) * 0.006 * uv.y;
    vec4 worldPos = modelMatrix * vec4(p, 1.0);
    vNormal = normalize(normalMatrix * normal);
    vViewDir = normalize(cameraPosition - worldPos.xyz);
    gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
  }
`;

const petalFragmentShader = `
  varying vec2 vUv;
  varying vec3 vNormal;
  varying vec3 vViewDir;
  uniform vec3 uColorOuter, uColorInner, uSunDir;
  void main() {
    vec3 V = normalize(vViewDir);
    vec3 L = normalize(uSunDir);
    vec3 N = normalize(vNormal);
    vec3 base = mix(uColorInner, uColorOuter, vUv.y);
    float veins = sin(vUv.x * 50.0 + sin(vUv.y * 10.0)) * 0.5 + 0.5;
    base = mix(base, base * 0.85, veins * 0.15 * vUv.y);
    float sss = pow(max(dot(V, -L), 0.0), 3.0) * 0.7 * (1.0 - vUv.y * 0.4);
    float ndl = max(dot(N, L), 0.0);
    float rim = pow(1.0 - max(dot(N, V), 0.0), 4.0) * 0.3;
    vec3 col = base * (ndl * 0.7 + 0.3) + uColorOuter * sss * 1.6 + rim;
    gl_FragColor = vec4(col, 1.0);
  }
`;

function createPetalMaterial(outer, inner) {
  return new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0 },
      uColorOuter: { value: new THREE.Color(outer) },
      uColorInner: { value: new THREE.Color(inner) },
      uSunDir: { value: sun.position.clone().normalize() }
    },
    vertexShader: petalVertexShader,
    fragmentShader: petalFragmentShader,
    side: THREE.DoubleSide
  });
}

const waterMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uColor1: { value: new THREE.Color(0x051a24) },
    uColor2: { value: new THREE.Color(0x1a4550) },
    uSunDir: { value: sun.position.clone().normalize() },
    uSunColor: { value: new THREE.Color(0xfff0c0) },
    uFog: { value: scene.fog.color },
    uCameraPos: { value: camera.position }
  },
  vertexShader: `
    uniform float uTime;
    varying vec3 vPos, vNormal;
    void main() {
      vec3 p = position;
      float w = sin(p.x*1.1 + uTime*0.7)*0.06 + sin(p.z*1.2 + uTime*0.6)*0.05 + sin((p.x+p.z)*0.5 - uTime*0.9)*0.08;
      p.y += w;
      vPos = (modelMatrix * vec4(p, 1.0)).xyz;
      float e = 0.1;
      float wX = sin((p.x+e)*1.1 + uTime*0.7)*0.06 - sin((p.x-e)*1.1 + uTime*0.7)*0.06;
      float wZ = sin((p.z+e)*1.2 + uTime*0.6)*0.05 - sin((p.z-e)*1.2 + uTime*0.6)*0.05;
      vNormal = normalize(vec3(-wX, e*2.0, -wZ));
      gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
    }
  `,
  fragmentShader: `
    uniform vec3 uColor1, uColor2, uSunDir, uSunColor, uFog, uCameraPos;
    varying vec3 vPos, vNormal;
    void main() {
      vec3 V = normalize(uCameraPos - vPos);
      vec3 L = normalize(uSunDir);
      vec3 N = normalize(vNormal);
      float fresnel = pow(1.0 - max(dot(N, V), 0.0), 5.0);
      float spec = pow(max(dot(N, normalize(L+V)), 0.0), 120.0);
      vec3 ocean = mix(uColor1, uColor2, max(dot(N, L), 0.0));
      vec3 col = mix(ocean, uSunColor * 0.7, fresnel * 0.5) + uSunColor * spec;
      float f = clamp(length(vPos.xz) / 25.0, 0.0, 1.0);
      gl_FragColor = vec4(mix(col, uFog, f*f), 1.0);
    }
  `
});

/* ===== GEOMETRY GENERATORS ============================================= */
function makePetalGeo(l, w, c, t) {
  const geo = new THREE.BufferGeometry(), pos = [], norm = [], uv = [], idx = [];
  const segs = 24;
  for (let j = 0; j <= segs; j++) {
    const f = j / segs;
    const width = w * 4 * f * (1 - f) * f + t * (1 - f) * 0.3;
    const bent = c * f * f;
    const y = Math.sin(f * Math.PI * 0.5) * l * 0.4;
    const z = l * f - y;
    for (let s = -1; s <= 1; s += 2) {
      pos.push(s * width * 0.5, y + bent, z);
      norm.push(s * 0.2, 1, 0.1 * f);
      uv.push((s + 1) * 0.5, f);
    }
  }
  for (let j = 0; j < segs; j++) { const r = j * 2; idx.push(r, r + 1, r + 2, r + 1, r + 3, r + 2); }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  geo.setAttribute('normal', new THREE.Float32BufferAttribute(norm, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uv, 2));
  geo.setIndex(idx); geo.computeVertexNormals();
  return geo;
}

function makeLilyPadGeo(r, notch) {
  const geo = new THREE.BufferGeometry(), pos = [0, 0, 0], norm = [0, 1, 0], uv = [0.5, 0.5], idx = [];
  const segs = 96, angS = notch / 2, angE = tau - angS;
  for (let i = 0; i <= segs; i++) {
    const a = angS + (i / segs) * (angE - angS);
    const rad = r * (1 + Math.sin(a * 12) * 0.02);
    const x = Math.cos(a) * rad, z = Math.sin(a) * rad;
    const y = Math.pow(i / segs - 0.5, 2) * 0.15 + Math.sin(a * 4) * 0.03;
    pos.push(x, y, z); norm.push(Math.sin(a) * 0.1, 1, Math.cos(a) * 0.1); uv.push(x / (r * 2) + 0.5, z / (r * 2) + 0.5);
  }
  for (let i = 1; i <= segs; i++) idx.push(0, i, i + 1);
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  geo.setAttribute('normal', new THREE.Float32BufferAttribute(norm, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uv, 2));
  geo.setIndex(idx); geo.computeVertexNormals();
  return geo;
}

/* ===== BUILDERS ========================================================= */
const paletteS = [
  { outer: 0xf7c5d0, inner: 0xfde8ee, stamen: 0xfff0b0 },
  { outer: 0xf8e080, inner: 0xfef5b0, stamen: 0xffaa00 },
  { outer: 0xc0b0d8, inner: 0xe0d0f0, stamen: 0xf8f0c0 },
  { outer: 0xff9060, inner: 0xffd0a0, stamen: 0xffdd50 }
];

function spawnFlower(x, z, type) {
  const g = new THREE.Group(); g.position.set(x, 0, z);
  const col = paletteS[Math.floor(Math.random() * paletteS.length)];
  
  // Stem
  const sc = new THREE.CatmullRomCurve3([new THREE.Vector3(0, -0.6, 0), new THREE.Vector3(rand(-.1, .1), -.3, rand(-.1, .1)), new THREE.Vector3(0, 0.02, 0)]);
  const sMesh = new THREE.Mesh(new THREE.TubeGeometry(sc, 8, 0.025, 8, false), new THREE.MeshStandardMaterial({ color: 0x3a6b30, roughness: 0.9 }));
  sMesh.castShadow = true; g.add(sMesh);

  // Pad
  const pad = new THREE.Mesh(makeLilyPadGeo(rand(0.65, 0.95), type === 'lotus' ? 0.5 : 0.8), new THREE.MeshStandardMaterial({ color: 0x2a5d3a, roughness: 0.7, side: THREE.DoubleSide }));
  pad.position.y = 0.01; pad.rotation.y = rand(0, tau); pad.receiveShadow = true; g.add(pad);

  // Petals
  const fG = new THREE.Group(); fG.position.y = 0.04; g.add(fG);
  const layers = 4, petals = [];
  for (let l = 0; l < layers; l++) {
    const count = 8 + l * 3, mat = createPetalMaterial(col.outer, col.inner), r = 0.04 + l * 0.08;
    for (let p = 0; p < count; p++) {
      const a = (p / count) * tau + l * 0.5, pMesh = new THREE.Mesh(makePetalGeo(0.48 - l * 0.06, 0.15 + l * 0.02, 0.45 - l * 0.1, 0.02), mat);
      pMesh.position.set(Math.cos(a) * r, 0, Math.sin(a) * r); pMesh.rotation.y = -a + Math.PI / 2;
      pMesh.rotation.x = -Math.PI / 2.1; pMesh.userData = { open: -(Math.PI / 2.6 - l * 0.3) };
      pMesh.castShadow = true; fG.add(pMesh); petals.push(pMesh);
    }
  }

  // Stamen
  const stamen = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.05, 0.15, 12), new THREE.MeshStandardMaterial({ color: col.stamen, emissive: col.stamen, emissiveIntensity: 0.4 }));
  stamen.position.y = 0.06; stamen.scale.setScalar(0); fG.add(stamen);

  scene.add(g); g.scale.setScalar(0);
  const tl = gsap.timeline(); tl.to(g.scale, { x: 1, y: 1, z: 1, duration: 1.5, ease: "back.out" });
  petals.forEach((p, i) => tl.to(p.rotation, { x: p.userData.open, duration: 2 + Math.random(), ease: "power2.out" }, 0.6 + i * 0.02));
  tl.to(stamen.scale, { x: 1, y: 1, z: 1, duration: 1, ease: "elastic.out" }, 1.5);
  spawnRipple(x, z);
  return g;
}

function spawnRipple(x, z) {
  for (let i = 0; i < 2; i++) {
    const r = new THREE.Mesh(new THREE.RingGeometry(0.1, 0.15, 64), new THREE.MeshBasicMaterial({ color: 0xa0e0ff, transparent: true, opacity: 0.6, side: THREE.DoubleSide }));
    r.position.set(x, 0.02, z); r.rotation.x = -Math.PI / 2; scene.add(r);
    gsap.to(r.scale, { x: 8, y: 8, duration: 3, delay: i * 0.4 });
    gsap.to(r.material, { opacity: 0, duration: 3, delay: i * 0.4, onComplete: () => { scene.remove(r); r.geometry.dispose(); r.material.dispose(); } });
  }
}

/* ===== ENVIRONMENT ===== */
const water = new THREE.Mesh(new THREE.PlaneGeometry(60, 60, 160, 160), waterMat);
water.rotation.x = -Math.PI / 2; water.receiveShadow = true; scene.add(water);

// Mist
const mG = new THREE.BufferGeometry(), mP = new Float32Array(300 * 3), mV = [];
for (let i = 0; i < 300; i++) { mP[i*3] = rand(-15, 15); mP[i*3+1] = rand(0.1, 1); mP[i*3+2] = rand(-15, 15); mV.push({ y: rand(0.0005, 0.002) }); }
mG.setAttribute('position', new THREE.BufferAttribute(mP, 3));
const mist = new THREE.Points(mG, new THREE.PointsMaterial({ color: 0x80b0c0, size: 0.15, transparent: true, opacity: 0.15 }));
scene.add(mist);

// Fireflies
const flies = [];
for (let i = 0; i < 15; i++) {
  const f = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), new THREE.MeshStandardMaterial({ color: 0xccff55, emissive: 0xccff55, emissiveIntensity: 1.5, transparent: true, opacity: 0.8 }));
  f.position.set(rand(-10, 10), rand(0.5, 2), rand(-10, 10));
  f.userData = { orb: rand(1, 4), speed: rand(0.5, 1.2), phase: Math.random() * tau, base: f.position.clone() };
  scene.add(f); flies.push(f);
}

/* ===== INTERACTION ===== */
let type = 'lotus';
document.getElementById('btnLotus').onclick = () => type = 'lotus';
document.getElementById('btnLily').onclick = () => type = 'lily';
document.getElementById('btnClear').onclick = () => { scene.children.filter(c => c.type === 'Group').forEach(g => scene.remove(g)); };

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const waterPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
renderer.domElement.addEventListener('click', e => {
  if (orb.didDrag) return;
  mouse.x = (e.clientX / W) * 2 - 1; mouse.y = -(e.clientY / H) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const pt = new THREE.Vector3(); raycaster.ray.intersectPlane(waterPlane, pt);
  if (pt && pt.length() < 18) spawnFlower(pt.x, pt.z, type);
});

/* ===== RUN ===== */
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta(), time = clock.elapsedTime;
  waterMat.uniforms.uTime.value = time;
  waterMat.uniforms.uCameraPos.value.copy(camera.position);
  scene.traverse(c => { if (c.material && c.material.uniforms && c.material.uniforms.uTime) c.material.uniforms.uTime.value = time; });
  
  // Mist
  const p = mG.attributes.position.array;
  for (let i = 0; i < 300; i++) { p[i*3+1] += mV[i].y; if (p[i*3+1] > 1.2) p[i*3+1] = 0.1; }
  mG.attributes.position.needsUpdate = true;
  
  // Flies
  flies.forEach(f => {
    f.userData.phase += dt * f.userData.speed;
    f.position.x = f.userData.base.x + Math.sin(f.userData.phase) * f.userData.orb;
    f.position.z = f.userData.base.z + Math.cos(f.userData.phase) * f.userData.orb;
    f.material.emissiveIntensity = 1 + Math.sin(time * 3 + f.userData.phase) * 0.5;
  });

  const cx = Math.sin(orb.theta) * Math.sin(orb.phi) * orb.radius, cy = Math.cos(orb.phi) * orb.radius, cz = Math.cos(orb.theta) * Math.sin(orb.phi) * orb.radius;
  camera.position.lerp(new THREE.Vector3(cx, cy, cz), 0.1); camera.lookAt(0, 0, 0);
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => { renderer.setSize(window.innerWidth, window.innerHeight); camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); });
setTimeout(() => { document.getElementById('ui').classList.add('show'); document.getElementById('hint').classList.add('show'); [0, 1.5, -1.8].forEach((x, i) => setTimeout(() => spawnFlower(x, rand(-2, 2), i % 2 === 0 ? 'lotus' : 'lily'), i * 800)); }, 2000);
</script>
